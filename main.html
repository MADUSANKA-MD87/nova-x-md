<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supiri Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: #0f0c29;
            background: linear-gradient(to right, #24243e, #302b63, #0f0c29);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation */
        nav {
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: fixed;
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: 2px;
            color: #00d2ff;
        }

        .nav-links {
            list-style: none;
            display: flex;
        }

        .nav-links li {
            margin-left: 30px;
        }

        .nav-links a {
            text-decoration: none;
            color: white;
            font-weight: 400;
            transition: 0.3s;
        }

        .nav-links a:hover {
            color: #00d2ff;
        }

        /* Hero Section */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            max-width: 600px;
            margin-bottom: 30px;
            color: #ccc;
        }

        /* Button Style */
        .btn {
            padding: 12px 35px;
            background: #00d2ff;
            color: #0f0c29;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 25px rgba(0, 210, 255, 0.5);
        }

        /* Card Section */
        .container {
            padding: 100px 20px;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            width: 300px;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: #00d2ff;
        }

        .card h3 {
            margin-bottom: 15px;
            color: #00d2ff;
        }

        /* Footer */
        footer {
            margin-top: auto;
            padding: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MYBRAND</div>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="#">Services</a></li>
            <li><a href="#">Portfolio</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <section class="hero">
        <h1>𝙳𝙲𝚃 𝙽𝙾𝚅𝙰 𝚇 𝙼𝙳</h1>
        <p>CREATED BY MADUSANKA</p>
        <a href="#" class="btn">Get Started</a>
    </section>

    <div class="container">
        <div class="card">
            <h3>Web Design</h3>
            <p>Lassana ui/ux designs hadamu.</p>
        </div>
        <div class="card">
            <h3>Development</h3>
            <p>Clean code ekka supiri wada mawa.</p>
        </div>
        <div class="card">
            <h3>SEO</h3>
            <p>Google eke udaatama enna hadamu.</p>
        </div>
    </div>

    <footer>
        &copy; 2026 Created with ❤️ by MADUSANKA 
    </footer>

</body>
</html>
